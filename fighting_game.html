<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D横版格斗游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #4a90d9;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.3);
            max-width: 100%;
            max-height: 100vh;
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb 0%, #98d8c8 100%);
            max-width: 100%;
            height: auto;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .health-bar-container {
            width: 120px;
            height: 20px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            border: 2px solid #444;
        }
        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4757 0%, #ff6b81 100%);
            transition: width 0.3s ease;
        }
        .health-bar.enemy {
            background: linear-gradient(90deg, #ffa502 0%, #ff7f50 100%);
        }
        .name-tag {
            color: white;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #score {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOverScreen, #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
        }
        #gameOverScreen.hidden, #startScreen.hidden {
            display: none;
        }
        .screen-title {
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .screen-subtitle {
            color: white;
            font-size: 18px;
            margin-bottom: 25px;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.5);
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
            display: none;
        }
        #touchControls {
            position: absolute;
            bottom: -100px;
            left: 0;
            right: 0;
            height: 100px;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        #touchControls.active {
            display: flex;
        }
        .touch-left {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: 160px;
            height: 160px;
            pointer-events: auto;
        }
        .touch-right {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            width: 140px;
            height: 140px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            user-select: none;
            transition: all 0.1s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.92);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .dpad-btn {
            background: rgba(100, 100, 120, 0.4);
            border-color: rgba(150, 150, 180, 0.5);
            font-size: 22px;
        }
        .dpad-center {
            visibility: hidden;
        }
        .action-btn {
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
        }
        .action-btn.attack {
            background: rgba(0, 200, 80, 0.4);
            border-color: rgba(0, 255, 100, 0.6);
            grid-row: 2;
            grid-column: 1;
        }
        .action-btn.special {
            background: rgba(255, 150, 0, 0.4);
            border-color: rgba(255, 200, 50, 0.6);
            grid-row: 1;
            grid-column: 2;
        }
        #deviceIndicator {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            display: none;
        }
        @media (max-width: 820px), (max-height: 520px) {
            #gameCanvas {
                width: 100vw;
                height: auto;
            }
            .health-bar-container {
                width: 80px;
                height: 15px;
            }
            .name-tag {
                font-size: 10px;
            }
            #score {
                font-size: 14px;
            }
            .screen-title {
                font-size: 24px;
            }
            .screen-subtitle {
                font-size: 14px;
            }
            .btn {
                padding: 10px 25px;
                font-size: 14px;
            }
            .touch-btn {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }
            .touch-btn.jump {
                width: 40px;
                height: 40px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="ui">
            <div>
                <div class="name-tag">玩家</div>
                <div class="health-bar-container">
                    <div id="playerHealth" class="health-bar" style="width: 100%"></div>
                </div>
            </div>
            <div>
                <div class="name-tag">敌人</div>
                <div class="health-bar-container">
                    <div id="enemyHealth" class="health-bar enemy" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <div id="score">分数: 0</div>
        
        <div id="startScreen">
            <div class="screen-title">2D格斗游戏</div>
            <div class="screen-subtitle">击败敌人获得分数！</div>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="screen-title" id="gameOverTitle"></div>
            <div class="screen-subtitle" id="finalScore"></div>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
        
        <div id="controls">
            <p>← → 移动 | ↑ 跳跃 | Z 攻击 | X 特殊攻击</p>
        </div>
        
        <div id="touchControls">
            <div class="touch-left">
                <div class="touch-btn dpad-btn"></div>
                <div class="touch-btn dpad-btn" id="touchJump">↑</div>
                <div class="touch-btn dpad-btn"></div>
                <div class="touch-btn dpad-btn" id="touchLeft">←</div>
                <div class="touch-btn dpad-center"></div>
                <div class="touch-btn dpad-btn" id="touchRight">→</div>
                <div class="touch-btn dpad-btn"></div>
                <div class="touch-btn dpad-btn">↓</div>
                <div class="touch-btn dpad-btn"></div>
            </div>
            <div class="touch-right">
                <div class="touch-btn action-btn attack" id="touchAttack">A</div>
                <div class="touch-btn action-btn special" id="touchSpecial">S</div>
            </div>
        </div>
        
        <div id="deviceIndicator">设备: <span id="deviceType"></span></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
