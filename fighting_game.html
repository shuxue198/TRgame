<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D横版格斗游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #4a90d9;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.3);
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb 0%, #98d8c8 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .health-bar-container {
            width: 200px;
            height: 25px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            border: 2px solid #444;
        }
        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4757 0%, #ff6b81 100%);
            transition: width 0.3s ease;
        }
        .health-bar.enemy {
            background: linear-gradient(90deg, #ffa502 0%, #ff7f50 100%);
        }
        .name-tag {
            color: white;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #score {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOverScreen, #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
        }
        #gameOverScreen.hidden, #startScreen.hidden {
            display: none;
        }
        .screen-title {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .screen-subtitle {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.5);
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="ui">
            <div>
                <div class="name-tag">玩家</div>
                <div class="health-bar-container">
                    <div id="playerHealth" class="health-bar" style="width: 100%"></div>
                </div>
            </div>
            <div>
                <div class="name-tag">敌人</div>
                <div class="health-bar-container">
                    <div id="enemyHealth" class="health-bar enemy" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <div id="score">分数: 0</div>
        
        <div id="startScreen">
            <div class="screen-title">2D格斗游戏</div>
            <div class="screen-subtitle">击败敌人获得分数！</div>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="screen-title" id="gameOverTitle"></div>
            <div class="screen-subtitle" id="finalScore"></div>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
        
        <div id="controls">
            <p>← → 移动 | ↑ 跳跃 | Z 攻击 | X 特殊攻击</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
